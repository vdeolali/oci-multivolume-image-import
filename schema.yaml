title: "Catalyst Center multi-volume image import"
description: "Imports the boot and data VMDKs prepared from the vendor OVA, creates OCI volumes, launches the boot image, and attaches the data volumes."
schemaVersion: 1.1.0
version: "1.0"
locale: "en"

variableGroups:
  - title: "Target environment"
    variables:
      - compartment_ocid
      - region
      - availability_domain_name
      - vcn_ocid
      - subnet_ocid
  - title: "Instance"
    variables:
      - environment_name
      - instance_display_name_prefix
      - instance_shape
      - ssh_public_key
  - title: "Prepared OVA disks"
    variables:
      - boot_volume_par_url
      - block_volumes
      - data_volume_attachment_type
      - volume_vpus_per_gb
      - volume_kms_key_id

variables:
  compartment_ocid:
    title: "Target compartment"
    type: oci:identity:compartment:id
    required: true
  region:
    title: "Region"
    type: oci:identity:region:name
    required: true
  availability_domain_name:
    title: "Availability domain"
    type: oci:identity:availabilitydomain:name
    required: true
    dependsOn:
      compartmentId: ${compartment_ocid}
  vcn_ocid:
    title: "Virtual cloud network"
    type: oci:core:vcn:id
    required: true
    dependsOn:
      compartmentId: ${compartment_ocid}
  subnet_ocid:
    title: "Subnet"
    type: oci:core:subnet:id
    required: true
    dependsOn:
      compartmentId: ${compartment_ocid}
      vcnId: ${vcn_ocid}
  instance_shape:
    title: "Compute shape"
    type: oci:core:instanceshape:name
    required: true
    dependsOn:
      compartmentId: ${compartment_ocid}
  ssh_public_key:
    title: "SSH public key"
    type: oci:core:ssh:publickey
    required: true
    additionalProps:
      allowMultiple: false
  environment_name:
    title: "Environment name"
    type: string
    required: true
  instance_display_name_prefix:
    title: "Instance name prefix"
    type: string
    required: true
  boot_volume_par_url:
    title: "Boot VMDK read PAR URL"
    type: string
    required: true
  block_volumes:
    title: "Data VMDKs"
    description: "One entry per data disk. Paste the read PAR URL generated by the OVA preparation helper."
    type: map
    valueType: data_volume
  data_volume:
    type: object
    visible: false
    attributes:
      - par_url
      - display_name
      - size_in_gbs
  par_url:
    actualName: par_url
    type: string
    visible: false
  display_name:
    actualName: display_name
    type: string
    visible: false
  size_in_gbs:
    actualName: size_in_gbs
    type: number
    visible: false
  data_volume_attachment_type:
    title: "Data-volume attachment type"
    type: enum
    enum:
      - paravirtualized
      - iscsi
    default: paravirtualized
    required: true
  volume_vpus_per_gb:
    title: "Data-volume performance (VPUs/GB)"
    type: number
    default: 10
    required: true
  volume_kms_key_id:
    title: "Optional customer-managed encryption key"
    type: oci:kms:key:id
    required: false
    dependsOn:
      compartmentId: ${compartment_ocid}
